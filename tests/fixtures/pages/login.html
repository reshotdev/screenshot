<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <style>
    body { font-family: sans-serif; margin: 40px; text-align: center; }
    .login-form { max-width: 300px; margin: 60px auto; }
    input { display: block; width: 100%; padding: 8px; margin: 8px 0; }
    button { padding: 8px 16px; width: 100%; }
  </style>
</head>
<body>
  <div class="login-form">
    <h1>Sign In</h1>
    <input type="email" placeholder="Email" />
    <input type="password" placeholder="Password" />
    <button type="submit">Log In</button>
  </div>
</body>
</html>
