name: Publish to npm
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test --run
      - run: pnpm build
      - run: pnpm pack --pack-destination /tmp
      - run: |
          TARBALL=$(ls /tmp/*.tgz)
          echo "Package size: $(du -h $TARBALL | cut -f1)"
          tar -tzf $TARBALL | head -40
      - name: Publish to npm (skip if version already on registry)
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@reshotdev/screenshot@$VERSION" version >/dev/null 2>&1; then
            echo "v$VERSION is already published — skipping."
          else
            pnpm publish --provenance --access public --no-git-checks --tag latest
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
